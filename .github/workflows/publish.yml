name: Publish teaching site

# Renderiza el tutorial de Quarto (R) y lo publica en GitHub Pages.
# Requiere habilitar Pages una vez: Settings → Pages → Build and deployment → Source: "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - 'teaching/disease-mapping/**'
      - '.github/workflows/publish.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R package dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::sf
            any::dplyr
            any::readr
            any::ggplot2
            any::leaflet
            any::htmltools
            any::scales
            any::RColorBrewer
            any::knitr
            any::rmarkdown

      - name: Render
        run: quarto render teaching/disease-mapping

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: teaching/disease-mapping/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
